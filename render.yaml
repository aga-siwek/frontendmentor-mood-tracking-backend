databases:
  - name: mood-tracking-db
    databaseName: mood_tracking
    user: mood_tracking_user
    plan: free

services:
  - type: web
    name: mood-tracking-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mood-tracking-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
